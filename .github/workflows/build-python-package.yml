name: build-python-package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to package, defaults to the published tag or latest release'
        required: false
        type: string
  release:
    types:
      - published

jobs:
  build-wheel:
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build tools
        run: >-
          python -m pip install --upgrade pip build pytest

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = '${{ github.event.release.tag_name }}'
          if (-not $tag) {
            $tag = '${{ github.event.inputs.release_tag }}'
          }
          if (-not $tag) {
            $tag = gh release view --repo $env:GITHUB_REPOSITORY --json tagName --jq .tagName
          }
          if (-not $tag) {
            throw 'No release tag could be resolved.'
          }
          gh release download $tag --repo $env:GITHUB_REPOSITORY --pattern 'TextECode.NativeBridge-win-x64-v*.zip' --dir artifacts/release --clobber
          $zip = Get-ChildItem artifacts/release/*.zip | Select-Object -First 1
          if (-not $zip) {
            throw 'No release zip asset was downloaded.'
          }
          Expand-Archive -Path $zip.FullName -DestinationPath artifacts/release/win-x64 -Force

      - name: Vendor native bridge into package
        run: >-
          python python/tools/vendor_native.py artifacts/release/win-x64

      - name: Build wheel
        run: >-
          python -m build python --wheel --outdir python/dist

      - name: Install built wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem python/dist/*.whl | Select-Object -First 1
          if (-not $wheel) {
            throw 'No wheel was built.'
          }
          python -m pip install --force-reinstall $wheel.FullName

      - name: Run Python package tests
        run: >-
          python -m pytest python/tests -q

      - name: Upload wheel artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: textecode-wheel
          path: python/dist/*.whl
          if-no-files-found: error
