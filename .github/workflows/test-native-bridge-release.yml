name: test-native-bridge-release

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test-native-bridge-release.yml'
      - 'tests/**'

jobs:
  test-release:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download latest release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release download --repo $env:GITHUB_REPOSITORY --pattern 'TextECode.NativeBridge-win-x64-v*.zip' --dir artifacts/release --clobber
          $zip = Get-ChildItem artifacts/release/*.zip | Select-Object -First 1
          if (-not $zip) {
            throw 'No release zip asset was downloaded.'
          }
          Expand-Archive -Path $zip.FullName -DestinationPath artifacts/release/win-x64 -Force

      - name: Run Python round-trip test
        run: >-
          python tests/python_smoke_test.py artifacts/release/win-x64/TextECode.NativeBridge.dll
