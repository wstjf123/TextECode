name: build-native-bridge

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-native-bridge.yml'
      - 'TextECode/**'
      - 'TextECode.NativeBridge/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Publish Native DLL
        run: >-
          dotnet publish TextECode.NativeBridge/TextECode.NativeBridge.csproj
          -c Release
          -r win-x64
          -o artifacts/win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextECode.NativeBridge-win-x64
          path: |
            artifacts/win-x64/TextECode.NativeBridge.dll
            artifacts/win-x64/TextECode.NativeBridge.pdb
          if-no-files-found: error
