name: build-native-bridge

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-native-bridge.yml'
      - 'TextECode/**'
      - 'TextECode.NativeBridge/**'
      - 'tests/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish Native DLL
        run: >-
          dotnet publish TextECode.NativeBridge/TextECode.NativeBridge.csproj
          -c Release
          -r win-x64
          -o artifacts/win-x64

      - name: Download real-world QSEC samples
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $sha = 'ff445968cab4e80dd80b0eed7f8cdce5c10967c6'
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Invoke-WebRequest -Headers @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = 'application/vnd.github+json' } -Uri "https://api.github.com/repos/OpenEpl/QSEC/zipball/$sha" -OutFile artifacts/qsec.zip
          Expand-Archive -Path artifacts/qsec.zip -DestinationPath artifacts/qsec-src -Force
          $root = Get-ChildItem artifacts/qsec-src | Select-Object -First 1
          if (-not $root) {
            throw 'Failed to extract the QSEC fixture repository.'
          }
          "QSEC_ROOT=$($root.FullName)" >> $env:GITHUB_ENV

      - name: Download real form .e sample
        shell: pwsh
        run: |
          $url = 'https://gitee.com/kyozy/esqlite31/raw/master/esqlite31/%E4%BE%8B%E7%A8%8B%28%E6%94%AF%E6%8C%81%E5%BA%93%E7%89%88%29.e'
          Invoke-WebRequest -Uri $url -OutFile artifacts/real-form-sample.e

      - name: Run real-world conversion test
        run: >-
          python tests/python_real_world_test.py artifacts/win-x64/TextECode.NativeBridge.dll "$env:QSEC_ROOT"

      - name: Run real form sample test
        run: >-
          python tests/python_form_generate_test.py artifacts/win-x64/TextECode.NativeBridge.dll artifacts/real-form-sample.e

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextECode.NativeBridge-win-x64
          path: |
            artifacts/win-x64/TextECode.NativeBridge.dll
            artifacts/win-x64/TextECode.NativeBridge.pdb
          if-no-files-found: error
